name: Run quest auto completion bot

on:
    workflow_dispatch: {}
    schedule:
        - cron: '15 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    run-bot:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5      # ← Changed to v5
              with:
                fetch-depth: 1

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install dependencies
              run: |
                  if [ -f package-lock.json ]; then
                    npm ci
                  else
                    npm install
                  fi

            - name: Run the bot
              env:
                  TOKEN: ${{ secrets.TOKEN }}
                  WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
              run: |
                  npm run github
